<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regenwormen Champions League</title>
<style>
  :root {
    --green-800: #27500A; --green-600: #3B6D11; --green-50: #EAF3DE; --green-200: #C0DD97;
    --purple-800: #3C3489; --purple-600: #534AB7; --purple-50: #EEEDFE; --purple-200: #AFA9EC;
    --amber-50: #FAEEDA; --gold: #B8860B;
    --bg: #fff; --bg2: #F8F7F4; --bg3: #F1EFE8;
    --text: #1a1a18; --text2: #5F5E5A; --text3: #888780;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --red-50: #FCEBEB; --red-600: #A32D2D;
    --radius: 10px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
      --text: #f0efe8; --text2: #a8a79f; --text3: #6a6966;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

  header { background: var(--green-800); color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  .back-btn { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 20px; line-height: 1; flex-shrink: 0; margin-right: 2px; transition: color 0.15s; }
  .back-btn:hover { color: #fff; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-left: auto; flex-shrink: 0; transition: background 0.3s; }
  .conn-dot.online { background: #5DCAA5; }

  .tabs-bar { background: var(--bg); border-bottom: 0.5px solid var(--border); display: flex; overflow-x: auto; gap: 0; padding: 0 0.75rem; align-items: center; }
  .tabs-bar::-webkit-scrollbar { display: none; }
  .tab { padding: 12px 14px; font-size: 13px; font-weight: 500; color: var(--text2); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .tab.active { color: var(--green-800); border-bottom-color: var(--green-600); }
  .tab-add { padding: 8px 10px; font-size: 18px; color: var(--text3); border: none; background: none; cursor: pointer; flex-shrink: 0; line-height: 1; margin-left: 2px; transition: color 0.15s; }
  .tab-add:hover { color: var(--green-600); }

  main { max-width: 700px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }

  .card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
  .card-head { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); }
  .card-body { padding: 16px; }

  .stand-grid { display: flex; flex-direction: column; gap: 10px; }
  .stand-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .stand-item.rank-1 { background: var(--amber-50); border-color: rgba(185,134,11,0.25); }
  @media (prefers-color-scheme: dark) { .stand-item.rank-1 { background: #2a2510; border-color: rgba(185,134,11,0.3); } }
  .stand-rank { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
  .stand-name { font-size: 15px; font-weight: 500; flex: 1; }
  .stand-stats { display: flex; gap: 14px; align-items: center; }
  .stand-stat { text-align: center; }
  .stand-stat-val { font-size: 18px; font-weight: 600; color: var(--green-600); display: block; }
  .stand-item.rank-1 .stand-stat-val { color: var(--gold); }
  .stand-stat-lbl { font-size: 11px; color: var(--text3); white-space: nowrap; }

  .form-grid { display: flex; flex-direction: column; gap: 12px; }
  .form-row { display: flex; align-items: center; gap: 10px; }
  .form-row label { font-size: 14px; font-weight: 500; color: var(--text); min-width: 72px; }
  .form-row input[type="date"] { flex: 1; padding: 8px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; background: var(--bg2); color: var(--text); outline: none; }
  .form-row input[type="date"]:focus { border-color: var(--green-600); }
  .score-inputs { display: grid; gap: 8px; }
  .score-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .score-row .pname { font-size: 14px; font-weight: 500; flex: 1; }
  .score-row input { width: 80px; padding: 6px 10px; border: 0.5px solid var(--border2); border-radius: 8px; font-size: 16px; text-align: center; background: var(--bg); color: var(--text); outline: none; }
  .score-row input:focus { border-color: var(--green-600); }
  .hint { font-size: 12px; color: var(--text3); }
  .btn-save { width: 100%; padding: 11px; border-radius: var(--radius); border: none; background: var(--green-800); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.88; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 8px 10px; text-align: left; color: var(--text2); font-weight: 500; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  td { padding: 9px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); }
  .date-cell { color: var(--text2); font-size: 12px; white-space: nowrap; }
  .score-cell { text-align: center; font-weight: 500; }
  .score-cell.winner { color: var(--green-600); font-weight: 700; }
  .score-cell.winner::after { content: ' ✓'; font-size: 11px; }
  .del-btn { padding: 3px 8px; border-radius: 6px; border: 0.5px solid var(--border2); background: none; color: var(--text3); cursor: pointer; font-size: 11px; }
  .del-btn:hover { background: var(--red-50); color: var(--red-600); border-color: rgba(163,45,45,0.3); }
  .games-wrap { overflow-x: auto; }
  .empty { padding: 2rem; text-align: center; color: var(--text3); font-size: 14px; }
  .loading { padding: 2rem; text-align: center; color: var(--text2); font-size: 14px; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 400px; border: 0.5px solid var(--border2); }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .modal-field input { width: 100%; padding: 8px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; background: var(--bg2); color: var(--text); outline: none; }
  .modal-field input:focus { border-color: var(--green-600); }
  .player-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .player-tag { display: flex; align-items: center; gap: 8px; background: var(--bg2); border-radius: 8px; padding: 6px 10px; font-size: 14px; }
  .player-tag span { flex: 1; }
  .player-tag button { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; line-height: 1; }
  .player-tag button:hover { color: var(--red-600); }
  .add-player-row { display: flex; gap: 8px; }
  .add-player-row input { flex: 1; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px; background: var(--bg2); color: var(--text); outline: none; }
  .add-player-row button { padding: 7px 14px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); cursor: pointer; font-size: 14px; font-weight: 500; }
  .modal-actions { display: flex; gap: 8px; margin-top: 1rem; }
  .btn-cancel { flex: 1; padding: 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); cursor: pointer; font-size: 14px; font-weight: 500; }
  .btn-create { flex: 1; padding: 10px; border-radius: var(--radius); border: none; background: var(--green-800); color: #fff; cursor: pointer; font-size: 14px; font-weight: 600; }
  .del-comp-btn { font-size: 11px; padding: 3px 8px; border-radius: 6px; border: 0.5px solid var(--border2); background: none; color: var(--text3); cursor: pointer; }
  .del-comp-btn:hover { background: var(--red-50); color: var(--red-600); }

  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: #2C2C2A; color: #fff; padding: 9px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; transition: transform 0.25s; z-index: 999; pointer-events: none; }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn" title="Terug">‹</a>
  <span style="font-size:22px">🪱</span>
  <h1>Regenwormen Champions League</h1>
  <div class="conn-dot" id="connDot"></div>
</header>

<div class="tabs-bar" id="tabBar">
  <div class="loading" style="padding:12px 8px;font-size:13px">Laden…</div>
</div>

<main id="mainContent">
  <div class="loading">Laden…</div>
</main>

<!-- Modal: nieuwe competitie -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>Nieuwe competitie</h2>
    <div class="modal-field">
      <label>Naam (bijv. P-M-R)</label>
      <input type="text" id="compName" placeholder="Naam van de competitie">
    </div>
    <div class="modal-field">
      <label>Spelers</label>
      <div class="player-list" id="playerList"></div>
      <div class="add-player-row">
        <input type="text" id="newPlayerInput" placeholder="Naam toevoegen" onkeydown="if(event.key==='Enter')addPlayer()">
        <button onclick="addPlayer()">+ Voeg toe</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-create" onclick="createComp()">Aanmaken</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB1x5ZRLKxI84LPQZxfPp453PTBng0Zw8I",
  authDomain: "rummikub-76911.firebaseapp.com",
  databaseURL: "https://rummikub-76911-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rummikub-76911",
  storageBucket: "rummikub-76911.firebasestorage.app",
  messagingSenderId: "790361424918",
  appId: "1:790361424918:web:fc516404adf67dccaee137"
};

// Seed: P-M-R competitie met historische data
const SEED_COMPS = [
  {
    id: "pmr",
    label: "P-M-R",
    players: ["Papa","Mama","Riva"],
    games: [
      {d:"22-04-2026",s:{Papa:8,Mama:13,Riva:7}},
      {d:"22-04-2026",s:{Papa:7,Mama:10,Riva:7}},
      {d:"22-04-2026",s:{Papa:2,Mama:16,Riva:16}},
      {d:"26-04-2026",s:{Papa:11,Mama:16,Riva:10}},
      {d:"26-04-2026",s:{Papa:11,Mama:11,Riva:13}}
    ]
  }
];

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}
const db = firebase.database();
const rootRef = db.ref('regenwormen');

let comps = [];
let activeCompId = null;
let gamesListener = null;
let modalPlayers = [];

// Verbindingsstatus
db.ref('.info/connected').on('value', s => {
  document.getElementById('connDot').classList.toggle('online', !!s.val());
});

// ── INIT ──────────────────────────────────
async function init() {
  try {
    // Seed als leeg
    const snap = await rootRef.child('comps').once('value');
    if (!snap.exists()) {
      for (const c of SEED_COMPS) {
        await rootRef.child(`comps/${c.id}`).set({ label: c.label, players: c.players });
        for (const g of c.games) {
          await rootRef.child(`comps/${c.id}/games`).push(g);
        }
      }
    }
    // Live listener op competities
    rootRef.child('comps').on('value', snap => {
      const raw = snap.val() || {};
      comps = Object.entries(raw).map(([id, v]) => ({ id, label: v.label, players: v.players || [] }));
      comps.sort((a,b) => a.label.localeCompare(b.label));
      if (!activeCompId || !comps.find(c=>c.id===activeCompId)) {
        activeCompId = comps.length ? comps[0].id : null;
      }
      renderTabs();
      if (activeCompId) listenGames(activeCompId);
      else document.getElementById('mainContent').innerHTML = '<div class="empty">Nog geen competities. Maak er een aan met de + knop.</div>';
    }, err => {
      document.getElementById('mainContent').innerHTML = `<div class="empty">Kan geen verbinding maken met de database.<br><small>${err.message}</small></div>`;
      document.getElementById('tabBar').innerHTML = '';
    });
  } catch(err) {
    document.getElementById('mainContent').innerHTML = `<div class="empty">Fout bij laden: ${err.message}</div>`;
    document.getElementById('tabBar').innerHTML = '';
  }
}

// ── TABS ──────────────────────────────────
function renderTabs() {
  document.getElementById('tabBar').innerHTML =
    comps.map(c => `<button class="tab${c.id===activeCompId?' active':''}" onclick="switchComp('${c.id}')">${c.label}</button>`).join('') +
    `<button class="tab-add" onclick="openModal()" title="Nieuwe competitie">＋</button>`;
}

function switchComp(id) {
  if (gamesListener) { rootRef.child(`comps/${activeCompId}/games`).off('value', gamesListener); gamesListener = null; }
  activeCompId = id;
  renderTabs();
  listenGames(id);
}

// ── GAMES LISTENER ────────────────────────
function listenGames(compId) {
  document.getElementById('mainContent').innerHTML = '<div class="loading">Laden…</div>';
  if (gamesListener) { rootRef.child(`comps/${activeCompId}/games`).off('value', gamesListener); }
  gamesListener = rootRef.child(`comps/${compId}/games`).on('value', snap => {
    const raw = snap.val() || {};
    const games = Object.entries(raw).map(([k,v]) => ({key:k,...v}));
    games.sort((a,b) => {
      const pa = a.d.split('-').reverse().join('');
      const pb = b.d.split('-').reverse().join('');
      return pa.localeCompare(pb);
    });
    renderAll(compId, games);
  });
}

// ── RENDER ────────────────────────────────
// Regenwormen: HOOGSTE score wint
function getWinner(scores) {
  let max = -Infinity, winner = null;
  for (const [p,s] of Object.entries(scores)) {
    if (typeof s === 'number' && s > max) { max = s; winner = p; }
  }
  return winner;
}

function calcStandings(games, players) {
  const stats = {};
  players.forEach(p => stats[p] = {wins:0, games:0, total:0});
  games.forEach(g => {
    const sc = g.s || {};
    players.forEach(p => { if (p in sc) { stats[p].games++; stats[p].total += sc[p]; } });
    const w = getWinner(sc);
    if (w && w in stats) stats[w].wins++;
  });
  return players.map(p => ({
    name:p, wins:stats[p].wins, games:stats[p].games, total:stats[p].total,
    avg: stats[p].games ? Math.round(stats[p].total / stats[p].games) : 0
  })).sort((a,b) => b.total - a.total || b.wins - a.wins);
}

const MEDALS = ['🥇','🥈','🥉',''];

function renderAll(compId, games) {
  const comp = comps.find(c=>c.id===compId);
  if (!comp) return;
  const players = comp.players;
  const standings = calcStandings(games, players);

  const now = new Date();
  const todayVal = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  // STAND
  const standHTML = `
  <div class="card">
    <div class="card-head">
      <span class="card-title">Stand</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:12px;color:var(--text3)">${games.length} potjes</span>
        <button class="del-comp-btn" onclick="deleteComp('${compId}')">Verwijder competitie</button>
      </div>
    </div>
    <div class="card-body">
      <div class="stand-grid">
        ${standings.map((s,i) => `
          <div class="stand-item${i===0?' rank-1':''}">
            <div class="stand-rank">${MEDALS[Math.min(i,3)]}</div>
            <div class="stand-name">${s.name}</div>
            <div class="stand-stats">
              <div class="stand-stat">
                <span class="stand-stat-val">${s.total}</span>
                <span class="stand-stat-lbl">totaal pts</span>
              </div>
              <div class="stand-stat">
                <span class="stand-stat-val">${s.wins}</span>
                <span class="stand-stat-lbl">gewonnen</span>
              </div>
              <div class="stand-stat">
                <span class="stand-stat-val">${s.avg}</span>
                <span class="stand-stat-lbl">gem. pts</span>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;

  // FORM
  const scoreInputs = players.map(p => `
    <div class="score-row">
      <span class="pname">${p}</span>
      <input type="number" id="sc_${p}" min="0" value="0" inputmode="numeric">
    </div>`).join('');

  const formHTML = `
  <div class="card">
    <div class="card-head"><span class="card-title">Potje toevoegen</span></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-row">
          <label>Datum</label>
          <input type="date" id="new_date" value="${todayVal}">
        </div>
        <div class="score-inputs">${scoreInputs}</div>
        <p class="hint">Vul de wormen-score in. Hoogste score = winnaar.</p>
        <button class="btn-save" onclick="saveGame('${compId}')">Potje opslaan</button>
      </div>
    </div>
  </div>`;

  // TABLE
  const rows = [...games].reverse().map(g => {
    const sc = g.s || {};
    const winner = getWinner(sc);
    return `<tr>
      <td class="date-cell">${g.d}</td>
      ${players.map(p => `<td class="score-cell${p===winner?' winner':''}">${p in sc ? sc[p] : '—'}</td>`).join('')}
      <td><button class="del-btn" onclick="deleteGame('${compId}','${g.key}')">✕</button></td>
    </tr>`;
  }).join('');

  const tableHTML = `
  <div class="card">
    <div class="card-head"><span class="card-title">Alle potjes</span></div>
    <div class="games-wrap">
      <table>
        <thead><tr>
          <th>Datum</th>
          ${players.map(p=>`<th style="text-align:center">${p}</th>`).join('')}
          <th></th>
        </tr></thead>
        <tbody>${rows || `<tr><td colspan="${players.length+2}" class="empty">Nog geen potjes</td></tr>`}</tbody>
      </table>
    </div>
  </div>`;

  document.getElementById('mainContent').innerHTML = standHTML + formHTML + tableHTML;
}

// ── SAVE / DELETE GAME ────────────────────
function saveGame(compId) {
  const comp = comps.find(c=>c.id===compId);
  const dateInput = document.getElementById('new_date').value;
  if (!dateInput) { showToast('Kies een datum'); return; }
  const [y,m,d] = dateInput.split('-');
  const scores = {};
  comp.players.forEach(p => { scores[p] = parseInt(document.getElementById('sc_'+p).value)||0; });
  rootRef.child(`comps/${compId}/games`).push({d:`${d}-${m}-${y}`, s:scores})
    .then(() => { showToast('Potje opgeslagen ✓'); comp.players.forEach(p => { document.getElementById('sc_'+p).value=0; }); })
    .catch(() => showToast('Fout bij opslaan'));
}

function deleteGame(compId, key) {
  if (!confirm('Potje verwijderen?')) return;
  rootRef.child(`comps/${compId}/games/${key}`).remove()
    .then(() => showToast('Potje verwijderd'))
    .catch(() => showToast('Fout bij verwijderen'));
}

function deleteComp(compId) {
  if (!confirm('Hele competitie verwijderen inclusief alle potjes?')) return;
  rootRef.child(`comps/${compId}`).remove()
    .then(() => showToast('Competitie verwijderd'))
    .catch(() => showToast('Fout bij verwijderen'));
}

// ── MODAL: nieuwe competitie ──────────────
function openModal() {
  modalPlayers = [];
  document.getElementById('compName').value = '';
  document.getElementById('newPlayerInput').value = '';
  renderPlayerList();
  document.getElementById('modalBg').classList.add('open');
  setTimeout(() => document.getElementById('compName').focus(), 100);
}

function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

function renderPlayerList() {
  document.getElementById('playerList').innerHTML = modalPlayers.map((p,i) =>
    `<div class="player-tag"><span>${p}</span><button onclick="removePlayer(${i})">×</button></div>`
  ).join('');
}

function addPlayer() {
  const input = document.getElementById('newPlayerInput');
  const name = input.value.trim();
  if (!name) return;
  if (modalPlayers.includes(name)) { showToast('Naam bestaat al'); return; }
  modalPlayers.push(name);
  input.value = '';
  renderPlayerList();
  input.focus();
}

function removePlayer(i) { modalPlayers.splice(i,1); renderPlayerList(); }

function createComp() {
  const label = document.getElementById('compName').value.trim();
  if (!label) { showToast('Geef een naam op'); return; }
  if (modalPlayers.length < 2) { showToast('Voeg minimaal 2 spelers toe'); return; }
  if (comps.find(c=>c.label===label)) { showToast('Naam bestaat al'); return; }
  const id = 'comp_' + Date.now();
  rootRef.child(`comps/${id}`).set({ label, players: modalPlayers })
    .then(() => { closeModal(); showToast(`${label} aangemaakt ✓`); activeCompId = id; })
    .catch(() => showToast('Fout bij aanmaken'));
}

// ── TOAST ─────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── START ─────────────────────────────────
init();
</script>
</body>
