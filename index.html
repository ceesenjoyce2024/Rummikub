<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champions League Rummikub</title>
<style>
  :root {
    --purple-50: #EEEDFE; --purple-200: #AFA9EC; --purple-600: #534AB7; --purple-800: #3C3489;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --amber-50: #FAEEDA; --amber-600: #854F0B; --amber-800: #633806;
    --gray-50: #F1EFE8; --gray-100: #D3D1C7; --gray-400: #888780; --gray-800: #444441;
    --green-50: #EAF3DE; --green-600: #3B6D11; --green-800: #27500A;
    --red-50: #FCEBEB; --red-600: #A32D2D; --red-800: #791F1F;
    --gold: #B8860B;
    --bg: #fff; --bg2: #F8F7F4; --bg3: #F1EFE8;
    --text: #1a1a18; --text2: #5F5E5A; --text3: #888780;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --radius: 10px; --radius-lg: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
      --text: #f0efe8; --text2: #a8a79f; --text3: #6a6966;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

  /* Header */
  header { background: var(--purple-800); color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  header .trophy { font-size: 22px; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; margin-left: auto; flex-shrink: 0; transition: background 0.3s; }
  .conn-dot.online { background: #5DCAA5; }

  /* Tabs */
  .tabs { background: var(--bg); border-bottom: 0.5px solid var(--border); display: flex; overflow-x: auto; gap: 0; padding: 0 1rem; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text2); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.15s; }
  .tab.active { color: var(--purple-800); border-bottom-color: var(--purple-600); }

  /* Main layout */
  main { max-width: 700px; margin: 0 auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }

  /* Cards */
  .card { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border); overflow: hidden; }
  .card-head { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text2); }
  .card-body { padding: 16px; }

  /* Standings */
  .stand-grid { display: grid; gap: 10px; }
  .stand-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .stand-rank { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
  .stand-name { font-size: 15px; font-weight: 500; flex: 1; }
  .stand-stats { display: flex; gap: 14px; align-items: center; }
  .stand-stat { text-align: center; }
  .stand-stat-val { font-size: 18px; font-weight: 600; color: var(--purple-600); display: block; }
  .stand-stat-lbl { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .stand-item.rank-1 .stand-stat-val { color: var(--gold); }
  @media (prefers-color-scheme: dark) {
    .stand-item.rank-1 { background: #2a2510; border-color: rgba(185,134,11,0.3); }
  }

  /* Form */
  .form-grid { display: flex; flex-direction: column; gap: 12px; }
  .form-row { display: flex; align-items: center; gap: 10px; }
  .form-row label { font-size: 14px; font-weight: 500; color: var(--text); min-width: 72px; }
  .form-row input[type="text"], .form-row input[type="number"], .form-row input[type="date"] {
    flex: 1; padding: 8px 12px; border: 0.5px solid var(--border2); border-radius: var(--radius); font-size: 14px;
    background: var(--bg2); color: var(--text); outline: none; transition: border 0.15s;
  }
  .form-row input:focus { border-color: var(--purple-600); }
  .score-inputs { display: grid; gap: 8px; }
  .score-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); }
  .score-row .pname { font-size: 14px; font-weight: 500; flex: 1; }
  .score-row input { width: 80px; padding: 6px 10px; border: 0.5px solid var(--border2); border-radius: 8px; font-size: 16px; text-align: center; background: var(--bg); color: var(--text); outline: none; }
  .score-row input:focus { border-color: var(--purple-600); }
  .hint { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .btn-save { width: 100%; padding: 11px; border-radius: var(--radius); border: none; background: var(--purple-800); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.88; }
  .btn-save:active { opacity: 0.75; }

  /* Games table */
  .games-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { padding: 8px 10px; text-align: left; color: var(--text2); font-weight: 500; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  th.num, td.num { text-align: center; }
  td { padding: 9px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg2); }
  .date-cell { color: var(--text2); font-size: 12px; white-space: nowrap; }
  .score-cell { text-align: center; font-weight: 500; }
  .score-cell.winner { color: var(--teal-600); font-weight: 700; position: relative; }
  .score-cell.winner::after { content: ' ✓'; font-size: 11px; }
  .del-btn { padding: 3px 8px; border-radius: 6px; border: 0.5px solid var(--border2); background: none; color: var(--text3); cursor: pointer; font-size: 11px; }
  .del-btn:hover { background: var(--red-50); color: var(--red-600); border-color: rgba(163,45,45,0.3); }

  /* Empty / loading */
  .empty { padding: 2rem; text-align: center; color: var(--text3); font-size: 14px; }
  .loading { padding: 2rem; text-align: center; color: var(--text2); font-size: 14px; }

  /* Toast */
  #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--gray-800); color: #fff; padding: 9px 20px; border-radius: 999px; font-size: 13px; font-weight: 500; transition: transform 0.25s; z-index: 999; pointer-events: none; }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 500px) {
    main { padding: 0.75rem 0.75rem; }
    .card-body { padding: 12px; }
    .stand-wins { font-size: 18px; }
  }
</style>

// ══════════════════════════════════════════
// APP STATE
// ══════════════════════════════════════════
firebase.initializeApp(firebaseConfig);

let gamesCache = {};
let listeners = {};

function ref(compId) { return db.ref('rummikub/' + compId + '/games'); }

// Verbindingsstatus
db.ref('.info/connected').on('value', snap => {
  document.getElementById('connDot').classList.toggle('online', !!snap.val());
});

// ══════════════════════════════════════════
// SEED — eenmalig inladen als db leeg is
// ══════════════════════════════════════════
async function seedIfEmpty() {
  for (const comp of COMPS) {
    const snap = await db.ref('rummikub/' + comp.id + '/games').once('value');
    if (!snap.exists()) {
      const items = SEED[comp.id] || [];
      const updates = {};
      items.forEach(item => {
        const key = db.ref('rummikub/' + comp.id + '/games').push().key;
        updates[key] = item;
      });
      await db.ref('rummikub/' + comp.id + '/games').update(updates);
    }
  }
}

// ══════════════════════════════════════════

  document.getElementById('tabBar').innerHTML = COMPS.map(c =>
    `<button class="tab${c.id===activeComp?' active':''}" onclick="switchComp('${c.id}')">${c.label}</button>`
  ).join('');
}

function switchComp(id) {
  if (listeners[activeComp]) {
    ref(activeComp).off('value', listeners[activeComp]);
    delete listeners[activeComp];
  }
  activeComp = id;
  renderTabs();
  listenComp(id);
}

// ══════════════════════════════════════════
// REALTIME LISTENER
// ══════════════════════════════════════════
function listenComp(compId) {
  document.getElementById('mainContent').innerHTML = '<div class="loading">Laden…</div>';
  const handler = snap => {
    const raw = snap.val() || {};
    const games = Object.entries(raw).map(([k,v]) => ({key:k, ...v}));
    games.sort((a,b) => {
      const pa = a.d.split('-').reverse().join('');
      const pb = b.d.split('-').reverse().join('');
      return pa.localeCompare(pb) || 0;
    });
    gamesCache[compId] = games;
    renderAll(compId, games);
  };
  listeners[compId] = handler;
  ref(compId).on('value', handler);
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function getWinner(scores) {
  let min = Infinity, winner = null;
  for (const [p,s] of Object.entries(scores)) {
    if (typeof s === 'number' && s < min) { min = s; winner = p; }
  }
  return winner;
}

function calcStandings(games, players) {
  const stats = {};
  players.forEach(p => stats[p] = {wins:0, games:0, total:0});
  games.forEach(g => {
    const sc = g.s || {};
    players.forEach(p => {
      if (p in sc) { stats[p].games++; stats[p].total += sc[p]; }
    });
    const w = getWinner(sc);
    if (w && w in stats) stats[w].wins++;
  });
  return players.map(p => ({
    name: p, wins: stats[p].wins, games: stats[p].games, total: stats[p].total,
    avg: stats[p].games ? Math.round(stats[p].total / stats[p].games) : 0
  })).sort((a,b) => a.total - b.total || b.wins - a.wins);
}

const MEDALS = ['🥇','🥈','🥉',''];

                <span class="stand-stat-lbl">gem. pts</span>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;

  // ADD FORM
  const scoreInputs = players.map(p => `
    <div class="score-row">
      <span class="pname">${p}</span>
      <input type="number" id="sc_${p}" min="0" value="0" inputmode="numeric">
    </div>`).join('');

  const formHTML = `
  <div class="card">
    <div class="card-head"><span class="card-title">Potje toevoegen</span></div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-row">
          <label>Datum</label>
          <input type="date" id="new_date" value="${todayVal}">
        </div>

        <button class="btn-save" onclick="saveGame('${compId}')">Potje opslaan</button>
      </div>
    </div>
  </div>`;

  // GAMES TABLE
  const revGames = [...games].reverse();
  const tableRows = revGames.map(g => {
    const sc = g.s || {};
    const winner = getWinner(sc);
    return `<tr>
      <td class="date-cell">${g.d}</td>
      ${players.map(p => `<td class="score-cell${p===winner?' winner':''}">${p in sc ? sc[p] : '—'}</td>`).join('')}
      <td><button class="del-btn" onclick="deleteGame('${compId}','${g.key}')">✕</button></td>
    </tr>`;
  }).join('');

  const tableHTML = `
  <div class="card">
    <div class="card-head"><span class="card-title">Alle potjes</span></div>
    <div class="games-wrap">
      <table>
        <thead><tr>
          <th>Datum</th>
          ${players.map(p=>`<th class="num">${p}</th>`).join('')}
          <th></th>
        </tr></thead>
        <tbody>${tableRows || `<tr><td colspan="${players.length+2}" class="empty">Nog geen potjes</td></tr>`}</tbody>
      </table>
    </div>
  </div>`;

  document.getElementById('mainContent').innerHTML = standHTML + formHTML + tableHTML;
}

// ══════════════════════════════════════════
// SAVE GAME
// ══════════════════════════════════════════
function saveGame(compId) {
  const comp = COMPS.find(c=>c.id===compId);
  const dateInput = document.getElementById('new_date').value;
  if (!dateInput) { showToast('Kies een datum'); return; }
  const [y,m,d] = dateInput.split('-');
  const dateStr = `${d}-${m}-${y}`;

  const scores = {};
  comp.players.forEach(p => {
    scores[p] = parseInt(document.getElementById('sc_'+p).value) || 0;
  });

  ref(compId).push({ d: dateStr, s: scores })
    .then(() => {
      showToast('Potje opgeslagen ✓');
      comp.players.forEach(p => { document.getElementById('sc_'+p).value = 0; });
    })
    .catch(() => showToast('Fout bij opslaan'));
}

// ══════════════════════════════════════════
// DELETE GAME
// ══════════════════════════════════════════
function deleteGame(compId, key) {
  if (!confirm('Potje verwijderen?')) return;
  ref(compId).child(key).remove()
    .then(() => showToast('Potje verwijderd'))
    .catch(() => showToast('Fout bij verwijderen'));
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
renderTabs();
seedIfEmpty().then(() => listenComp(activeComp));
</script>
