<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champions League — Spelkeuze</title>
<style>
  :root {
    --purple-800: #3C3489; --purple-600: #534AB7; --purple-50: #EEEDFE; --purple-200: #AFA9EC;
    --bg: #fff; --bg2: #F8F7F4; --bg3: #F1EFE8;
    --text: #1a1a18; --text2: #5F5E5A; --text3: #888780;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --radius: 10px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252522; --bg3: #2e2e2b;
      --text: #f0efe8; --text2: #a8a79f; --text3: #6a6966;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

  header { background: var(--purple-800); color: #fff; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
  header .trophy { font-size: 22px; }

  main { max-width: 500px; margin: 0 auto; padding: 2rem 1rem; }

  .intro { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }

  .game-list { display: flex; flex-direction: column; gap: 12px; }

  .game-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; text-decoration: none; color: var(--text); transition: border-color 0.15s, background 0.15s; }
  .game-card:hover { border-color: var(--purple-200); background: var(--purple-50); }
  .game-card.disabled { opacity: 0.45; cursor: default; pointer-events: none; }

  .game-icon { font-size: 28px; width: 44px; text-align: center; flex-shrink: 0; }
  .tile-wrap { width: 44px; height: 44px; flex-shrink: 0; }
  .tile-img-crop { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; object-position: center center; display: block; }
  .game-info { flex: 1; }
  .game-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
  .game-sub { font-size: 13px; color: var(--text2); }
  .game-arrow { font-size: 18px; color: var(--text3); flex-shrink: 0; }
  .badge-soon { font-size: 11px; font-weight: 500; background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border2); border-radius: 999px; padding: 2px 9px; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <span class="trophy">🏆</span>
  <h1>Champions League</h1>
</header>

<main>
  <p class="intro">Kies een spel om de stand en uitslagen te bekijken.</p>

  <div class="game-list">

    <a href="bananas.html" class="game-card disabled">
      <div class="game-icon">🍌</div>
      <div class="game-info">
        <div class="game-name">Bananas Champions League</div>
        <div class="game-sub">Woordspel met letter-tegels</div>
      </div>
      <span class="badge-soon">Binnenkort</span>
    </a>

    <a href="regenwormen.html" class="game-card">
      <div class="game-icon">🪱</div>
      <div class="game-info">
        <div class="game-name">Regenwormen Champions League</div>
        <div class="game-sub">Dobbelspel om de meeste wormen</div>
      </div>
      <span class="game-arrow">›</span>
    </a>

    <a href="rummikub.html" class="game-card">
      <div class="tile-wrap"><img src="rummikub-joker.png" class="tile-img-crop" alt="Rummikub joker"></div>
      <div class="game-info">
        <div class="game-name">Rummikub Champions League</div>
        <div class="game-sub">Stand, uitslagen en statistieken</div>
      </div>
      <span class="game-arrow">›</span>
    </a>

  </div>
</main>

</body>
</html>
